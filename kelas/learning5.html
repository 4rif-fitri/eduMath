<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="../style/global.css">
	<link rel="stylesheet" href="./style/learning5.css">
</head>

<body>
	<main>

		<header>
			<nav>
				<h3>EduMath</h3>

				<label class="hamburgur" for="hamburgur">
					<div class="bar"></div>
					<div class="bar"></div>
					<div class="bar"></div>
				</label>
			</nav>
		</header>
		<div id="wrapper">
			<input type="checkbox" hidden name="hamburgur" id="hamburgur">
			<aside>
				<ul>
					<li>
						<a href="../index.html">Home</a>
					</li>
					<li>
						<a href="../kelas.html">Kelas</a>
					</li>
					<li>
						<a href="../myKelas.html">My Kelas</a>
					</li>
					<li>
						<a href="./index.html">Back</a>
					</li>
				</ul>
			</aside>

			<section>
				<div class="content">
					<div class="math-diagram">
						<div class="row top-equation">
							<div class="highlight-dashed"></div>
							<span class="num">8</span>
							<span class="op">+</span>
							<div class="circle blue">3</div>
							<span class="op">=</span>
							<span class="num">?</span>
				
							<div class="bond-lines">
								<div class="line left"></div>
								<div class="line right"></div>
							</div>
							<div class="bond-circles">
								<div class="circle yellow">2</div>
								<div class="circle pink">1</div>
							</div>
						</div>
				
						<div class="row">
							<span class="num">8</span>
							<span class="op">+</span>
							<span class="num">2</span>
							<span class="op">=</span>
							<div class="box-yellow">10</div>
						</div>
				
						<div class="arrow-down">↓</div>
				
						<div class="row">
							<div class="box-yellow">10</div>
							<span class="op">+</span>
							<div class="circle pink small">1</div>
							<span class="op">=</span>
							<span class="num">11</span>
						</div>
					</div>
				</div>
			</section>
		</div>
	</main>
	<script src="./script/learning5.js"></script>
</body>

</html>
