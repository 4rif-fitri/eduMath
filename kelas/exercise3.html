<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="../style/global.css">
	<link rel="stylesheet" href="./style/exercise3.css">
</head>

<body>
	<main>

		<header>
			<nav>
				<h3>EduMath</h3>

				<label class="hamburgur" for="hamburgur">
					<div class="bar"></div>
					<div class="bar"></div>
					<div class="bar"></div>
				</label>
			</nav>
		</header>
		<div id="wrapper">
			<input type="checkbox" hidden name="hamburgur" id="hamburgur">
			<aside>
				<ul>
					<li>
						<a href="../index.html">Home</a>
					</li>
					<li>
						<a href="../kelas.html">Kelas</a>
					</li>
					<li>
						<a href="../myKelas.html">My Kelas</a>
					</li>
					<li>
						<a href="./index.html">Back</a>
					</li>
				</ul>
			</aside>

			<section>
				<div class="content">
					<div class="popup" id="pop">
						<h3>Result</h3>

						<div class="grid-4">
							<article>
								<p>Soalan</p>
								<span id="bilQuestion">10</span>
							</article>
							<article>
								<p>Masa</p>
								<span id="masa">10minit</span>
							</article>
							<article>
								<p>Betul</p>
								<span id="betul">10</span>
							</article>
							<article>
								<p>Salah</p>
								<span id="salah">10</span>
							</article>
						</div>

						<div class="grid-3">
							<article>
								<p>Betul</p>
								<span id="ketepatan">20%</span>
							</article>
							<article>
								<p>Salah</p>
								<span id="kadarSalah">80%</span>
							</article>
							<article>
								<p>1 soalan</p>
								<span id="avgTimeQuestion">12 saat</span>
							</article>
						</div>

						<center class="img">
							<div class="text" id="text"></div>
							<img id="good" style="display: none;" height="30%" src="../imgs/images.jpg" alt="">
							<img id="notbad" style="display: none;" height="200rem"
								src="../imgs/8fa056b2db922feae203e193e9bffcc6.jpg" alt="">
							<img id="bad" style="display: none;" height="200rem" src="../imgs/sinirli-sigma.png"
								alt="">
						</center>
						<div class="overall" id="overallElement">
							<p>Rating: <span id="overall">10</span></p>
						</div>
						<a href="../index.html" class="btn-home" id="back">Back</a>
					</div>

					<h2>Latihan 3</h2>

					<div class="moniter">
						<article>
							<p>Soalan</p>
							<h3 id="question">0</h3>
						</article>
						<article>
							<p>Masa</p>
							<h3 id="time">00:00</h3>
						</article>
						<article>
							<p>Betul</p>
							<h3 id="score">0</h3>
						</article>
						<article>
							<p>Salah</p>
							<h3 id="wrong">0</h3>
						</article>
					</div>

					<div class="guide">
						<h4 id="textMessage">Lorem ipsum dolor sit amet consectetur.</h4>
					</div>

					<div class="board">
						<div class="box" id="moniter1">5</div>
						<div class="box">+</div>
						<div class="box" id="moniter2">5</div>
						<div class="box">=</div>
						<div class="box ans" id="hasil"></div>
					</div>

					<div id="bar"></div>

					<div class="choices">
						<button class="soalan-item" data-id="0">1</button>
						<button class="soalan-item" data-id="1">1</button>
						<button class="soalan-item" data-id="2">1</button>
						<button class="soalan-item" data-id="3">1</button>
						<button class="soalan-item" data-id="4">1</button>
						<button class="soalan-item" data-id="5">1</button>
					</div>

					<div class="btn-container">
						<button id="giveUp">Give Up</button>
					</div>
				</div>

			</section>
		</div>
	</main>
	<script src="./script/exercise3.js"></script>
</body>

</html>
